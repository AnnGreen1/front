<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Vue2 响应式原理简易实现</title>
</head>
<body>
  <h2>Vue2 响应式（defineProperty）</h2>
  <div id="app"></div>
  <button id="btn">count++</button>
  <script>
    /***********************
     * 依赖收集器 Dep
     ***********************/
    class Dep {
      constructor() {
        this.subscribers = new Set()
      }

      depend() {
        if (activeEffect) {
          this.subscribers.add(activeEffect)
        }
      }

      notify() {
        this.subscribers.forEach(effect => effect())
      }
    }

    /***********************
     * 当前正在执行的副作用
     ***********************/
    let activeEffect = null

    function effect(fn) {
      activeEffect = fn
      fn()
      activeEffect = null
    }

    /***********************
     * 响应式核心
     ***********************/
    function reactive(obj) {
      Object.keys(obj).forEach(key => {
        let value = obj[key]

        const dep = new Dep()

        Object.defineProperty(obj, key, {
          get() {
            console.log(`读取 ${key}`)
            dep.depend()
            return value
          },

          set(newValue) {
            console.log(`修改 ${key}:`, newValue)

            value = newValue

            dep.notify()
          }
        })
      })

      return obj
    }

    /***********************
     * 创建响应式对象
     ***********************/
    const state = reactive({
      count: 0
    })

    /***********************
     * 模拟组件渲染
     ***********************/
    effect(() => {
      document.getElementById('app').innerHTML = `
        <h3>${state.count}</h3>
      `
    })

    /***********************
     * 修改数据
     ***********************/
    document.getElementById('btn').onclick = () => {
      state.count++
    }
  </script>
</body>
</html>
