<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 响应式原理 - Object.defineProperty 实现</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .demo-box {
            border: 1px solid #ddd;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .log-box {
            background: #f5f5f5;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            background: #42b983;
            color: white;
            border: none;
            border-radius: 3px;
        }
        button:hover {
            background: #369970;
        }
        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Vue 响应式原理演示</h1>
    <h2>使用 Object.defineProperty 实现</h2>

    <div class="demo-box">
        <h3>示例 1: 基础响应式对象</h3>
        <p>姓名：<span id="name-display"></span></p>
        <p>年龄：<span id="age-display"></span></p>
        <input type="text" id="name-input" placeholder="输入姓名">
        <input type="number" id="age-input" placeholder="输入年龄" style="width: 100px;">
        <br>
        <button onclick="updateName()">更新姓名</button>
        <button onclick="updateAge()">更新年龄</button>
    </div>

    <div class="demo-box">
        <h3>示例 2: 嵌套对象响应式</h3>
        <p>城市：<span id="city-display"></span></p>
        <p>地址：<span id="address-display"></span></p>
        <input type="text" id="city-input" placeholder="输入城市">
        <input type="text" id="address-input" placeholder="输入地址">
        <br>
        <button onclick="updateCity()">更新城市</button>
        <button onclick="updateAddress()">更新地址</button>
    </div>

    <div class="demo-box">
        <h3>示例 3: 数组响应式</h3>
        <p>列表：<span id="list-display"></span></p>
        <button onclick="addItem()">添加项</button>
        <button onclick="removeItem()">移除项</button>
        <button onclick="updateItem()">更新第一项</button>
    </div>

    <div class="log-box">
        <h3>依赖追踪日志:</h3>
        <div id="log-container"></div>
    </div>

    <script>
        // ============================================
        // Vue 响应式核心实现
        // ============================================

        let logId = 0;
        function log(message) {
            const container = document.getElementById('log-container');
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerHTML = `<strong>[${++logId}]</strong> ${message}`;
            container.insertBefore(logItem, container.firstChild);
        }

        // 依赖收集器 (Watcher)
        class Dep {
            constructor() {
                this.subscribers = [];
            }

            // 添加订阅者
            depend() {
                if (Dep.target && !this.subscribers.includes(Dep.target)) {
                    this.subscribers.push(Dep.target);
                    log(`添加订阅者，当前订阅者数量：${this.subscribers.length}`);
                }
            }

            // 通知所有订阅者更新
            notify() {
                log(`通知 ${this.subscribers.length} 个订阅者更新`);
                this.subscribers.forEach(sub => sub.update());
            }
        }

        // 全局目标，用于依赖收集
        Dep.target = null;

        // 观察者 (Watcher)
        class Watcher {
            constructor(getter) {
                this.getter = getter;
                this.value = this.get();
            }

            get() {
                // 设置全局目标为当前 watcher
                Dep.target = this;
                try {
                    // 执行 getter 函数，触发属性的 get 拦截器
                    const value = this.getter();
                    return value;
                } finally {
                    // 重置全局目标
                    Dep.target = null;
                }
            }

            update() {
                const newValue = this.get();
                const oldValue = this.value;
                this.value = newValue;
                log(`Watcher 更新：${oldValue} => ${newValue}`);
            }
        }

        // 响应式处理器
        function defineReactive(obj, key, val) {
            const dep = new Dep();
            
            // 递归处理嵌套对象
            let childDep = observe(val);

            Object.defineProperty(obj, key, {
                enumerable: true,
                configurable: true,
                get() {
                    log(`<span style="color: #42b983;">GET</span> 属性 "${key}": ${val}`);
                    
                    // 依赖收集
                    dep.depend();
                    
                    return val;
                },
                set(newVal) {
                    if (newVal === val) return;
                    
                    log(`<span style="color: #e74c3c;">SET</span> 属性 "${key}": ${val} => ${newVal}`);
                    val = newVal;
                    
                    // 处理新值的响应式
                    childDep = observe(newVal);
                    
                    // 通知订阅者
                    dep.notify();
                }
            });
        }

        // 观察对象，使其变为响应式
        function observe(value) {
            if (typeof value !== 'object' || value === null) {
                return;
            }

            let dep = new Dep();

            if (Array.isArray(value)) {
                // 处理数组
                const arrayProto = Array.prototype;
                const arrayMethods = ['push', 'pop', 'shift', 'unshift', 'splice', 'sort', 'reverse'];
                
                arrayMethods.forEach(method => {
                    const original = arrayProto[method];
                    Object.defineProperty(value, method, {
                        writable: true,
                        configurable: true,
                        enumerable: false,
                        value(...args) {
                            log(`<span style="color: #e74c3c;">ARRAY</span> 方法 "${method}" 被调用`);
                            const result = original.apply(value, args);
                            dep.notify();
                            return result;
                        }
                    });
                });

                // 使数组元素也变为响应式
                value.forEach((item, index) => {
                    defineReactive(value, index, item);
                });
            } else {
                // 处理普通对象
                Object.keys(value).forEach(key => {
                    defineReactive(value, key, value[key]);
                });
            }

            return dep;
        }

        // 创建响应式对象
        function reactive(obj) {
            observe(obj);
            return obj;
        }

        // ============================================
        // 实际使用示例
        // ============================================

        // 示例 1: 基础响应式对象
        const person = reactive({
            name: '张三',
            age: 25
        });

        // 创建计算属性 watcher
        const nameWatcher = new Watcher(() => {
            document.getElementById('name-display').textContent = person.name;
            return person.name;
        });

        const ageWatcher = new Watcher(() => {
            document.getElementById('age-display').textContent = person.age;
            return person.age;
        });

        function updateName() {
            const input = document.getElementById('name-input');
            if (input.value.trim()) {
                person.name = input.value.trim();
            }
        }

        function updateAge() {
            const input = document.getElementById('age-input');
            if (input.value) {
                person.age = parseInt(input.value);
            }
        }

        // 示例 2: 嵌套对象响应式
        const userInfo = reactive({
            address: {
                city: '北京',
                street: '朝阳区'
            }
        });

        const cityWatcher = new Watcher(() => {
            document.getElementById('city-display').textContent = userInfo.address.city;
            return userInfo.address.city;
        });

        const addressWatcher = new Watcher(() => {
            document.getElementById('address-display').textContent = userInfo.address.street;
            return userInfo.address.street;
        });

        function updateCity() {
            const input = document.getElementById('city-input');
            if (input.value.trim()) {
                userInfo.address.city = input.value.trim();
            }
        }

        function updateAddress() {
            const input = document.getElementById('address-input');
            if (input.value.trim()) {
                userInfo.address.street = input.value.trim();
            }
        }

        // 示例 3: 数组响应式
        const itemList = reactive(['苹果', '香蕉', '橙子']);

        const listWatcher = new Watcher(() => {
            document.getElementById('list-display').textContent = itemList.join(', ');
            return itemList.join(', ');
        });

        function addItem() {
            const fruits = ['葡萄', '西瓜', '榴莲', '芒果', '草莓'];
            const randomFruit = fruits[Math.floor(Math.random() * fruits.length)];
            itemList.push(randomFruit);
        }

        function removeItem() {
            if (itemList.length > 0) {
                itemList.pop();
            }
        }

        function updateItem() {
            if (itemList.length > 0) {
                itemList[0] = ' Updated-' + Date.now();
            }
        }

        // 初始化显示
        log('=== 响应式系统初始化完成 ===');
        log('当前状态:');
        log(`- person.name: ${person.name}, person.age: ${person.age}`);
        log(`- userInfo.address.city: ${userInfo.address.city}, userInfo.address.street: ${userInfo.address.street}`);
        log(`- itemList: [${itemList.join(', ')}]`);
    </script>
</body>
</html>
