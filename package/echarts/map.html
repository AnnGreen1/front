<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>ECharts 中国地图示例</title>
    <!-- 引入 ECharts 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/6.0.0/echarts.min.js"
        integrity="sha512-4/g9GAdOdTpUP2mKClpKsEzaK7FQNgMjq+No0rX8XZlfrCGtbi4r+T/p5fnacsEC3zIAmHKLJUL7sh3/yVA4OQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        #map-container {
            width: 100%;
            height: 800px;
        }
    </style>
</head>

<body>

    <div id="map-container"></div>

    <script type="text/javascript">
        // 异步加载本地地图数据
        fetch('./rpc-geojson.json')
            .then(response => response.json())
            .then(chinaJson => {
                // 初始化 echarts 实例
                var myChart = echarts.init(document.getElementById('map-container'));
                // 注册地图
                echarts.registerMap('china', chinaJson);


                // 定义一些标记位置（经纬度坐标）
                var geoCoordMap = {
                    '北京': [116.4074, 39.9042],
                    '上海': [121.4737, 31.2304],
                    '广州': [113.2644, 23.1291],
                    '杭州': [120.1551, 30.2741],
                    '成都': [104.0659, 30.6599]
                };
                // 配置选项
                var option = {
                    title: {
                        text: '中国地图',
                        subtext: '标记示例',
                        left: 'center',
                        textStyle: {
                            fontSize: 18
                        },
                        subtextStyle: {
                            fontSize: 14
                        }
                    },
                    tooltip: {
                        trigger: 'item',
                        formatter: function (params) {
                            if (params.value && params.value.length > 1) {
                                return params.name + ': (' + params.value[0] + ', ' + params.value[1] + ')';
                            } else {
                                return params.name;
                            }
                        }
                    },
                    visualMap: {
                        min: 0,
                        max: 100,
                        left: 'left',
                        top: 'bottom',
                        text: ['高', '低'],
                        calculable: true,
                        inRange: {
                            color: ['#e6f7ff', '#1890ff', '#0050b3']
                        }
                    },
                    geo: {
                        map: 'china',
                        roam: true,
                        zoom: 1, // 当前视角的缩放比例
                        scaleLimit: {
                            // 滚轮缩放的极限控制，默认的缩放为1
                            min: 1, // 最小的缩放值
                            max: 10, // 最大的缩放值
                        },
                        z: 0,
                        itemStyle: {
                            areaColor: '#eee',
                            borderColor: '#333'
                        },
                        emphasis: {
                            itemStyle: {
                                areaColor: '#1890ff'
                            }
                        }
                    },
                    series: [
                        {
                            name: '中国地图',
                            type: 'map',
                            map: 'china',
                            geoIndex: 0, // 解决在地图上缩放重影问题
                            roam: false,
                            label: {
                                show: true,
                                color: '#000',
                                fontSize: 8
                            },
                            itemStyle: {
                                areaColor: '#eee',
                                borderColor: '#333'
                            },
                            emphasis: {
                                label: {
                                    color: '#fff',
                                    fontSize: 10
                                },
                                itemStyle: {
                                    areaColor: '#1890ff'
                                }
                            },
                        },
                        {
                            type: 'scatter',
                            coordinateSystem: 'geo',
                            data: [
                                {
                                    name: '北京',
                                    value: [116.4074, 39.9042, 0, 0], // 经度 纬度 等级 学校类型（对应iconArray中形状）
                                },
                                {
                                    name: '苏州市第一小学',
                                    value: [120.619585, 31.299379, 2, 0],
                                },
                                {
                                    name: '盐城市初级中学',
                                    value: [120.139998, 33.377631, 1, 1],
                                },
                                {
                                    name: '连云港市大学',
                                    value: [119.178821, 34.600018, 2, 2],
                                },
                            ],
                            label: {
                                show: true,
                                color: '#000',
                                formatter: function (params) {
                                    return params.data.name
                                },
                            },
                            symbol: 'circle',
                            symbolSize: 28,
                            z: 9999,
                        },
                    ]
                };

                // 设置配置项并渲染图表
                myChart.setOption(option);

                // 响应窗口大小变化
                window.addEventListener('resize', function () {
                    myChart.resize();
                });
            })
            .catch(error => {
                console.error('加载地图数据失败:', error);
            });
    </script>
</body>

</html>
