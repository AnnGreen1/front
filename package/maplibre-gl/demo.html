<!DOCTYPE html>
<html>

<head>
    <!-- 设置字符编码为 UTF-8 -->
    <meta charset="UTF-8">
    <!-- 设置视口，确保移动端正确显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题 -->
    <title>MapLibre + 天地图</title>
    <!-- 引入 MapLibre GL JS 的 CSS 样式文件 -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <style>
        /* 重置 body 样式，移除默认边距 */
        body {
            margin: 0;
            font-family: sans-serif;
        }

        /* 地图容器样式：占满整个视口 */
        #map {
            width: 100vw;   /* 宽度为视口宽度 */
            height: 100vh;  /* 高度为视口高度 */
        }

        /* 信息面板样式：悬浮在地图上方 */
        .info-panel {
            position: absolute;    /* 绝对定位 */
            top: 10px;            /* 距离顶部 10px */
            left: 10px;           /* 距离左侧 10px */
            background: rgba(255, 255, 255, 0.9);  /* 白色半透明背景 */
            padding: 12px 16px;   /* 内边距 */
            border-radius: 8px;    /* 圆角 */
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);  /* 阴影效果 */
            font-size: 13px;       /* 字体大小 */
            z-index: 1;            /* 确保在地图上方 */
        }
    </style>
</head>

<body>
    <!-- 信息面板：显示点击坐标 -->
    <div class="info-panel" id="info">点击地图查看坐标</div>
    <!-- 地图容器 -->
    <div id="map"></div>
    
    <!-- 引入 MapLibre GL JS 的 JavaScript 文件 -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
        // 天地图 API 密钥（需要自行申请）
        const tk = 'eebc7831ad35aa41acac125945341982';

        // ==================== 创建地图实例 ====================
        const map = new maplibregl.Map({
            container: 'map',  // 指定地图容器元素的 ID
            style: {
                version: 8,    // Mapbox Style 规范版本
                sources: {
                    // 天地图矢量底图数据源
                    'tdt-vec': {
                        type: 'raster',          // 栅格类型
                        tiles: [
                            // WMTS 服务 URL 模板
                            `https://t0.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${tk}`
                        ],
                        tileSize: 256            // 瓦片大小
                    },
                    // 天地图矢量注记数据源
                    'tdt-cva': {
                        type: 'raster',
                        tiles: [
                            `https://t0.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=${tk}`
                        ],
                        tileSize: 256
                    }
                },
                layers: [
                    // 添加矢量底图图层
                    { id: 'tdt-vec', type: 'raster', source: 'tdt-vec' },
                    // 添加矢量注记图层（叠加在底图之上）
                    { id: 'tdt-cva', type: 'raster', source: 'tdt-cva' }
                ]
            },
            center: [116.397, 39.908],  // 初始中心点（北京坐标）
            zoom: 10                      // 初始缩放级别
        });

        // ==================== 添加控件 ====================
        // 添加导航控件（缩放、旋转）到右上角
        map.addControl(new maplibregl.NavigationControl(), 'top-right');
        // 添加比例尺控件到左下角
        map.addControl(new maplibregl.ScaleControl(), 'bottom-left');

        // ==================== 地图交互事件 ====================
        // 点击地图时显示坐标信息
        map.on('click', (e) => {
            document.getElementById('info').textContent =
                `经度: ${e.lngLat.lng.toFixed(4)}  纬度: ${e.lngLat.lat.toFixed(4)}`;
        });

        // ==================== 地图加载完成后添加标记和图层 ====================
        map.on('load', () => {
            // 1. 添加单个标记点（北京）
            new maplibregl.Marker({ color: '#e74c3c' })  // 创建红色标记
                .setLngLat([116.397, 39.908])            // 设置坐标
                .setPopup(new maplibregl.Popup().setHTML('<b>北京</b>'))  // 添加弹窗
                .addTo(map);                              // 添加到地图

            // 2. 添加 GeoJSON 数据源（包含上海和广州两个点）
            map.addSource('points', {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: [
                        { type: 'Feature', geometry: { type: 'Point', coordinates: [121.473, 31.230] }, properties: { name: '上海' } },
                        { type: 'Feature', geometry: { type: 'Point', coordinates: [113.264, 23.129] }, properties: { name: '广州' } }
                    ]
                }
            });

            // 3. 添加图层渲染 GeoJSON 数据
            map.addLayer({
                id: 'points-layer',      // 图层 ID
                type: 'circle',          // 图层类型（圆形标记）
                source: 'points',        // 数据源名称
                paint: {
                    'circle-radius': 8,              // 圆半径
                    'circle-color': '#3498db',       // 圆颜色（蓝色）
                    'circle-stroke-width': 2,        // 描边宽度
                    'circle-stroke-color': '#fff'    // 描边颜色（白色）
                }
            });
        });
    </script>
</body>

</html>
