<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapLibre 入门</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <style>
        body {
            margin: 0;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            // 不需要 token！
            // style: 'https://demotiles.maplibre.org/style.json',  // 演示瓦片
            style: 'https://tiles.openfreemap.org/styles/liberty', // OpenFreeMap（免费、开源、无需注册）
            center: [116.397, 39.908],   // 北京
            zoom: 10
        });

        // 添加导航控件
        map.addControl(new maplibregl.NavigationControl(), 'top-right');


        // 添加文字标注
        map.on('load', () => {
            map.addSource('cities', {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: [
                        {
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [116.397, 39.908] },
                            properties: { name: '北京', population: 2171 }
                        },
                        {
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [121.473, 31.230] },
                            properties: { name: '上海', population: 2489 }
                        },
                        {
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [113.264, 23.129] },
                            properties: { name: '广州', population: 1868 }
                        }
                    ]
                }
            });

            map.addLayer({
                id: 'cities-label',
                type: 'symbol',
                source: 'cities',
                layout: {
                    'text-field': ['get', 'name'],
                    'text-size': 14,
                    'text-offset': [0, -1.5],
                    'text-anchor': 'bottom'
                },
                paint: {
                    'text-color': '#333',
                    'text-halo-color': '#fff',
                    'text-halo-width': 2
                }
            });
        });
    </script>
</body>

</html>
