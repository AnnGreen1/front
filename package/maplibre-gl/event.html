<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapLibre 入门</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <style>
        body {
            margin: 0;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            // 不需要 token！
            // style: 'https://demotiles.maplibre.org/style.json',  // 演示瓦片
            style: 'https://tiles.openfreemap.org/styles/liberty', // OpenFreeMap（免费、开源、无需注册）
            center: [116.397, 39.908],   // 北京
            zoom: 10
        });

        // 添加导航控件
        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // 地图点击
        map.on('click', (e) => {
            console.log('点击坐标:', e.lngLat.lng, e.lngLat.lat);
        });

        // 图层点击
        map.on('click', 'cities-layer', (e) => {
            const props = e.features[0].properties;
            console.log('点击了:', props.name);
        });

        // 鼠标悬浮
        map.on('mouseenter', 'cities-layer', () => {
            map.getCanvas().style.cursor = 'text';
        });

        map.on('mouseleave', 'cities-layer', () => {
            map.getCanvas().style.cursor = '';
        });

        // 地图加载完成
        map.on('load', () => {
            console.log('地图加载完成');
        });

        // 移动/缩放结束
        map.on('moveend', () => {
            const center = map.getCenter();
            const zoom = map.getZoom();
            console.log(`中心: ${center.lng}, ${center.lat}  缩放: ${zoom}`);
        });
    </script>
</body>

</html>
