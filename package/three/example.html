<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 完整场景</title>
    <!-- importmap 配置：映射模块名到 CDN URL -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        .info {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            color: #aaa;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="info">
        拖拽旋转 · 滚轮缩放 · 右键平移
    </div>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script> -->

    <!-- 轨道控制器（鼠标交互）- 使用与 three.js r128 配套的浏览器版本 -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/controls/OrbitControls.js"></script> -->

    <!-- 使用 type="module" 的脚本 -->
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/controls/OrbitControls.js'
        
        // ============ 场景 ============
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('gray');
        scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);    // 雾效

        // ============ 相机 ============
        const camera = new THREE.PerspectiveCamera(
            60, window.innerWidth / window.innerHeight, 0.1, 1000
        );
        camera.position.set(5, 4, 8);

        // ============ 渲染器 ============
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;              // 开启阴影
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;  // 色调映射
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ============ 控制器 ============
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;       // 阻尼（惯性）
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2; // 限制不能翻到地下

        // ============ 光照 ============
        // 环境光
        scene.add(new THREE.AmbientLight(0x404060, 0.5));

        // 主光（平行光）
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 50;
        mainLight.shadow.camera.left = -10;
        mainLight.shadow.camera.right = 10;
        mainLight.shadow.camera.top = 10;
        mainLight.shadow.camera.bottom = -10;
        scene.add(mainLight);

        // 补光（暖色）
        const fillLight = new THREE.PointLight(0xff8844, 0.5, 20);
        fillLight.position.set(-3, 3, -3);
        scene.add(fillLight);

        // ============ 地面 ============
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x2a2a3e,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;      // 旋转为水平面
        ground.position.y = -0.5;
        ground.receiveShadow = true;           // 接收阴影
        scene.add(ground);

        // ============ 物体们 ============

        // 立方体（金属质感）
        const cubeGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const cubeMat = new THREE.MeshPhysicalMaterial({
            color: 0xe8c547,
            metalness: 0.9,
            roughness: 0.1,
            clearcoat: 1.0,
            clearcoatRoughness: 0.05
        });
        const cube = new THREE.Mesh(cubeGeo, cubeMat);
        cube.position.set(-2.5, 0.75, 0);
        cube.castShadow = true;
        scene.add(cube);

        // 球体（玻璃质感）
        const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
        const sphereMat = new THREE.MeshPhysicalMaterial({
            color: 0x4488ff,
            metalness: 0.0,
            roughness: 0.05,
            transmission: 1.0,      // 透射（玻璃效果）
            thickness: 0.5,
            ior: 1.5                // 折射率
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.set(0, 1, 0);
        sphere.castShadow = true;
        scene.add(sphere);

        // 圆环结
        const knotGeo = new THREE.TorusKnotGeometry(0.7, 0.25, 100, 16);
        const knotMat = new THREE.MeshStandardMaterial({
            color: 0xe84444,
            metalness: 0.7,
            roughness: 0.2
        });
        const knot = new THREE.Mesh(knotGeo, knotMat);
        knot.position.set(2.5, 1, 0);
        knot.castShadow = true;
        scene.add(knot);

        // 圆柱体
        const cylGeo = new THREE.CylinderGeometry(0.4, 0.4, 2, 32);
        const cylMat = new THREE.MeshStandardMaterial({
            color: 0x44bb88,
            metalness: 0.3,
            roughness: 0.5
        });
        const cylinder = new THREE.Mesh(cylGeo, cylMat);
        cylinder.position.set(0, 1, -3);
        cylinder.castShadow = true;
        scene.add(cylinder);

        // ============ 动画 ============
        function animate() {
            requestAnimationFrame(animate);

            // 立方体旋转
            cube.rotation.x += 0.005;
            cube.rotation.y += 0.01;

            // 圆环结自转
            knot.rotation.x += 0.008;
            knot.rotation.y += 0.012;

            // 球体浮动
            sphere.position.y = 1 + Math.sin(Date.now() * 0.001) * 0.3;

            // 更新控制器（阻尼需要每帧更新）
            controls.update();

            renderer.render(scene, camera);
        }
        animate();

        // ============ 响应式 ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
