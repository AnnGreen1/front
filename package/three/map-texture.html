<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 入门</title>
    <style>
        * {
            margin: 0;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==========================================
        // 1. 场景（舞台）
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('pink');

        // ==========================================
        // 2. 相机（摄像机）
        // ==========================================
        const camera = new THREE.PerspectiveCamera(
            75,                                          // 视角（FOV，度）
            window.innerWidth / window.innerHeight,      // 宽高比
            0.1,                                         // 近裁剪面
            1000                                         // 远裁剪面
        );
        camera.position.set(0, 0, 5);   // 摄像机放在 (0, 0, 5)

        // ==========================================
        // 3. 渲染器（导播）
        // ==========================================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);   // 把 canvas 加到页面

        // ==========================================
        // 4. 光照（舞台灯光）
        // ==========================================
        // MeshStandardMaterial 需要光照才能显示颜色
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);  // 环境光
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);  // 平行光
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // ==========================================
        // 5. 物体（演员）
        // ==========================================
        const geometry = new THREE.BoxGeometry(1, 1, 1);       // 几何体：立方体
        const textureLoader = new THREE.TextureLoader();

        // 加载图片纹理（使用 CDN 图片确保可访问）
        const texture = textureLoader.load('https://picsum.photos/512/512?random=1');
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        // texture.repeat.set(4, 4);      // 纹理重复 4x4 次

        // 监听纹理加载完成
        texture.onLoad = () => {
            console.log('纹理加载完成');
        };

        texture.onError = (err) => {
            console.error('纹理加载失败:', err);
        };

        const material = new THREE.MeshStandardMaterial({
            map: texture,                // 漫反射贴图
            roughness: 0.5,              // 粗糙度
            metalness: 0.2               // 金属度
        });
        const cube = new THREE.Mesh(geometry, material);       // 网格 = 几何体 + 材质
        scene.add(cube);                                        // 加入场景


        // ==========================================
        // 5. 动画循环
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);     // 每帧调用一次

            // cube.rotation.x += 0.01;           // 旋转
            cube.rotation.y += 0.01;

            renderer.render(scene, camera);    // 渲染：用相机拍场景
        }
        animate();

        // 窗口大小变化时自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
