<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 加载 GLTF 模型</title>
    <style>
        * {
            margin: 0;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            color: #aaa;
            font-family: monospace;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="info">拖拽旋转 · 滚轮缩放 · 右键平移</div>
    
    <!-- 引入 Three.js 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    
    <!-- 引入 GLTFLoader（加载 GLTF/GLB 模型） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <!-- 引入 OrbitControls（鼠标交互） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ==========================================
        // 1. 场景（舞台）
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);

        // ==========================================
        // 2. 相机（摄像机）
        // ==========================================
        const camera = new THREE.PerspectiveCamera(
            60,                                          // 视角（FOV，度）
            window.innerWidth / window.innerHeight,      // 宽高比
            0.1,                                         // 近裁剪面
            1000                                         // 远裁剪面
        );
        camera.position.set(0, 2, 8);   // 摄像机放在 (0, 2, 8)

        // ==========================================
        // 3. 渲染器（导播）
        // ==========================================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);   // 把 canvas 加到页面

        // ==========================================
        // 4. 控制器（交互）
        // ==========================================
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // ==========================================
        // 5. 光照（舞台灯光）
        // ==========================================
        // 环境光（照亮整个场景）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // 主平行光（模拟太阳光）
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // 补光（消除阴影过暗）
        const fillLight = new THREE.PointLight(0x4488ff, 0.5, 20);
        fillLight.position.set(-3, 3, -3);
        scene.add(fillLight);

        // ==========================================
        // 6. 地面（参考）
        // ==========================================
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x2a2a3e,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1;
        ground.receiveShadow = true;
        scene.add(ground);

        // ==========================================
        // 7. 加载 GLTF 模型（使用在线模型）
        // ==========================================
        const loader = new THREE.GLTFLoader();

        // 使用 jsdelivr CDN 上的 Three.js 官方示例模型（稳定可用）
        loader.load(
            'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // 调整模型位置和缩放
                model.scale.set(2, 2, 2);
                model.position.set(0, -0.5, 0);
                
                // 启用阴影
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                console.log('模型加载成功:', gltf);
            },
            (xhr) => {
                // 加载进度
                console.log(`加载进度: ${(xhr.loaded / xhr.total * 100).toFixed(1)}%`);
            },
            (error) => {
                console.error('模型加载失败:', error);
            }
        );

        // ==========================================
        // 8. 动画循环
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);     // 每帧调用一次

            // 更新控制器（阻尼需要每帧更新）
            controls.update();

            renderer.render(scene, camera);    // 渲染：用相机拍场景
        }
        animate();

        // ==========================================
        // 9. 窗口大小变化时自适应
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
