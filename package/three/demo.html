<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 入门</title>
    <style>
        * {
            margin: 0;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==========================================
        // 1. 场景（舞台）
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('pink');

        // ==========================================
        // 2. 相机（摄像机）
        // ==========================================
        const camera = new THREE.PerspectiveCamera(
            75,                                          // 视角（FOV，度）
            window.innerWidth / window.innerHeight,      // 宽高比
            0.1,                                         // 近裁剪面
            1000                                         // 远裁剪面
        );
        camera.position.set(0, 0, 5);   // 摄像机放在 (0, 0, 5)

        // ==========================================
        // 3. 渲染器（导播）
        // ==========================================
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);   // 把 canvas 加到页面

        // ==========================================
        // 4. 物体（演员）
        // ==========================================
        const geometry = new THREE.BoxGeometry(1, 1, 1);       // 几何体：立方体
        const material = new THREE.MeshBasicMaterial({          // 材质：基础材质（不受光照影响）
            color: 'orange'
        });
        const cube = new THREE.Mesh(geometry, material);       // 网格 = 几何体 + 材质
        scene.add(cube);                                        // 加入场景

        // ==========================================
        // 5. 动画循环
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);     // 每帧调用一次

            // cube.rotation.x += 0.01;           // 旋转
            cube.rotation.y += 0.01;

            renderer.render(scene, camera);    // 渲染：用相机拍场景
        }
        animate();

        // 窗口大小变化时自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
