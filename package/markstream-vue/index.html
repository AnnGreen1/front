<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markstream Vue CDN Demo</title>
  
  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  
  <!-- markstream-vue CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markstream-vue@0.0.14-beta.3/dist/index.css">
  
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f5f5;
    }
    #app {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .loading { color: #999; text-align: center; padding: 50px; }
  </style>
</head>
<body>
  <div id="app">
    <div v-if="loading" class="loading">Loading...</div>
    <MarkdownRender v-else :content="markdownContent" />
  </div>
  
  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js",
        "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs",
        "katex": "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.mjs",
        "stream-markdown-parser": "https://cdn.jsdelivr.net/npm/stream-markdown-parser@0.0.91/dist/index.js"
      }
    }
  </script>
  
  <script type="module">
    const { createApp, ref, onMounted } = Vue;
    
    // 动态导入 markstream-vue（因为它是 ESM 模块）
    const { default: MarkdownRender } = await import('https://cdn.jsdelivr.net/npm/markstream-vue@0.0.14-beta.3/dist/index.js');
    
    // 设置全局依赖供 markstream-vue 使用
    window.mermaid = await import('mermaid');
    window.katex = await import('katex');
    window.mermaid.default.initialize({ startOnLoad: false });
    
    createApp({
      components: { MarkdownRender },
      setup() {
        const loading = ref(true);
        const markdownContent = ref('');
        
        onMounted(async () => {
          // 直接读取 test.md 文件
          const response = await fetch('test.md');
          markdownContent.value = await response.text();
          loading.value = false;
        });
        
        return { loading, markdownContent };
      }
    }).mount('#app');
  </script>
</body>
</html>
