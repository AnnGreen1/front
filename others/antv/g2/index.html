<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>G2 入门</title>
  <style>
    #container { width: 600px; height: 400px; margin: 40px auto; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script src="https://unpkg.com/@antv/g2/dist/g2.min.js"></script>
  <script>
    // 1. 创建 Chart 实例
    const chart = new G2.Chart({
      container: 'container',
      autoFit: true
    });

    // 2. 声明式描述图表
    chart.options({
      type: 'interval',
      data: [
        { genre: 'Sports', sold: 275 },
        { genre: 'Strategy', sold: 115 },
        { genre: 'Action', sold: 120 },
        { genre: 'Shooter', sold: 350 },
        { genre: 'Other', sold: 150 }
      ],
      encode: {
        x: 'genre',
        y: 'sold',
        color: 'genre'
      }
    });

    // 3. 渲染
    chart.render();
  </script>
</body>
</html>
