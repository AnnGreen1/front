<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>G2 入门</title>
    <style>
        #container {
            width: 600px;
            height: 400px;
            margin: 40px auto;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <script src="https://unpkg.com/@antv/g2/dist/g2.min.js"></script>
    <script>
        // 1. 创建 Chart 实例
        const chart = new G2.Chart({
            container: 'container',
            autoFit: true
        });

        // 2. 声明式描述图表
        chart.options({
            type: 'line',
            data: [
                { month: '1月', value: 3.5 },
                { month: '2月', value: 6 },
                { month: '3月', value: 4.8 },
                { month: '4月', value: 8 },
                { month: '5月', value: 7.2 },
                { month: '6月', value: 9.5 }
            ],
            encode: { x: 'month', y: 'value' },
            style: { lineWidth: 2.5, stroke: '#e15759' },
            axis: { y: { title: '访问量（万）' } },
            interaction: { tooltip: { marker: true } }   // 悬浮显示数据点
        });

        // 3. 渲染
        chart.render();
    </script>
</body>

</html>
