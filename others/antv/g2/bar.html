<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>G2 入门</title>
    <style>
        #container {
            width: 600px;
            height: 400px;
            margin: 40px auto;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <script src="https://unpkg.com/@antv/g2/dist/g2.min.js"></script>
    <script>
        // 1. 创建 Chart 实例
        const chart = new G2.Chart({
            container: 'container',
            autoFit: true
        });

        // 2. 声明式描述图表
        chart.options({
            type: 'interval',
            data: [
                { month: '1月', sales: 38 },
                { month: '2月', sales: 52 },
                { month: '3月', sales: 61 },
                { month: '4月', sales: 45 },
                { month: '5月', sales: 48 },
                { month: '6月', sales: 38 }
            ],
            encode: { x: 'month', y: 'sales' },
            axis: {
                x: { title: '月份' },
                y: { title: '销售额（万）' }
            },
            style: { fill: '#4e79a7', radiusTopLeft: 4, radiusTopRight: 4 }
        });

        // 3. 渲染
        chart.render();
    </script>
</body>

</html>
