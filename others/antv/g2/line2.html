<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>G2 入门</title>
    <style>
        #container {
            width: 600px;
            height: 400px;
            margin: 40px auto;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <script src="https://unpkg.com/@antv/g2/dist/g2.min.js"></script>
    <script>
        // 1. 创建 Chart 实例
        const chart = new G2.Chart({
            container: 'container',
            autoFit: true
        });

        // 2. 声明式描述图表
        chart.options({
            type: 'line',
            data: [
                { month: '1月', city: '北京', temp: -3 },
                { month: '2月', city: '北京', temp: 1 },
                { month: '3月', city: '北京', temp: 10 },
                { month: '4月', city: '北京', temp: 18 },
                { month: '1月', city: '广州', temp: 15 },
                { month: '2月', city: '广州', temp: 17 },
                { month: '3月', city: '广州', temp: 21 },
                { month: '4月', city: '广州', temp: 25 }
            ],
            encode: {
                x: 'month',
                y: 'temp',
                color: 'city'           // 按城市分色 → 自动生成多条线
            },
            style: { lineWidth: 2 },
            axis: { y: { title: '温度 (°C)' } }
        });

        // 3. 渲染
        chart.render();
    </script>
</body>

</html>
