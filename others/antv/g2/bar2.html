<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>G2 入门</title>
    <style>
        #container {
            width: 600px;
            height: 400px;
            margin: 40px auto;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <script src="https://unpkg.com/@antv/g2/dist/g2.min.js"></script>
    <script>
        // 1. 创建 Chart 实例
        const chart = new G2.Chart({
            container: 'container',
            autoFit: true
        });

        // 2. 声明式描述图表
        chart.options({
            type: 'interval',
            data: [
                { category: '产品A', value: 120 },
                { category: '产品B', value: 95 },
                { category: '产品C', value: 78 },
                { category: '产品D', value: 65 },
                { category: '产品E', value: 42 }
            ],
            encode: { x: 'category', y: 'value' },
            transform: [{ type: 'sortX', by: 'y', reverse: true }],
            axis: { y: { title: false } },
            style: { fill: '#59a14f' },
            coordinate: { transform: [{ type: 'transpose' }] }  // 转置坐标系
        });

        // 3. 渲染
        chart.render();
    </script>
</body>

</html>
