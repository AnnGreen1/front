<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function myInstanceOf(obj, constructor) {
            console.log("对象:", obj);
            console.log("构造函数:", constructor);
            console.log("构造函数的原型对象:", constructor.prototype);
            console.log("对象的原型链:", Object.getPrototypeOf(obj));

            // 获取构造函数的原型对象
            let prototype = constructor.prototype;
            // 获取对象的原型链
            let proto = Object.getPrototypeOf(obj);
            
            // 沿着原型链向上查找
            while (proto !== null) {
                if (proto === prototype) {
                    return true; // 找到匹配的原型，返回 true
                }
                proto = Object.getPrototypeOf(proto); // 继续向上查找
                console.log("继续查找，当前原型链:", proto);
            }
            return false; // 没有找到匹配的原型，返回 false
        }

        console.log(myInstanceOf([], Object)); // true
        console.log(myInstanceOf({}, Object)); // true
    </script>
</body>
</html>
