<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const obj = {
        radius: 10,
        diameter() {
          return this.radius * 2;
        },
        perimeter: () => {
          console.log(this);
          return 2 * Math.PI * this.radius;
        },
      };
      console.log(obj.diameter()); // 20
      console.log(obj.perimeter()); // NaN
    </script>
  </body>
</html>
