<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button class="shot">shot</button>

    <script>
      const btn = document.querySelector(".shot");

      function throttle(fn, delay = 1000) {
        let timer = null;
        return function (...args) {
          if (!timer) {
            // 如果当前没有定时器（冷却中）
            timer = setTimeout(() => {
              fn.apply(this, args);
              timer = null; // 执行完清空，允许下次触发
            }, delay);
          }
        };
      }

      function shot() {
        console.log("shot", new Date());
      }

      btn.addEventListener("click", throttle(shot, 3000));
    </script>
  </body>
</html>
